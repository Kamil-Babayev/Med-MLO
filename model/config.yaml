dataset:
  name: pathmnist
  #image_size: 224
  image_size: 64
  #batch_size: 64
  batch_size: 32
  num_workers: 2

model:
  architecture: resnet18
  num_classes: 9
  pretrained: true

training:
  #epochs: 10
  epochs: 5
  learning_rate: 0.001
  weight_decay: 0.0001
  validation_split: 0.2

paths:
  weights_dir: model/weights
  training_log: model/weights/training_run.json
